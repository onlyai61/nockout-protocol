<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 310" role="img" aria-labelledby="title desc">
  <title id="title">NOCKOUT Protocol title logo</title>
  <desc id="desc">White transparent mechanical wordmark for NOCKOUT PROTOCOL.</desc>
  <defs>
    <filter id="glow" x="-12%" y="-24%" width="124%" height="148%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
    <mask id="knockout-cuts">
      <rect width="920" height="310" fill="#fff"/>
      <g fill="#000" opacity="0.95">
        <path d="M94 66h34l-22 24H72z"/>
        <path d="M209 66h34l-22 24h-34z"/>
        <path d="M392 66h35l-22 24h-35z"/>
        <path d="M566 66h34l-22 24h-34z"/>
